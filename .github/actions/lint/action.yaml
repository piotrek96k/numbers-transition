name: Lint
runs:
  using: 'composite'
  steps:
    - name: Setup Node
      uses: actions/setup-node@v7
      with:
        node-version: 'lts/*'
        cache: 'npm'
    - name: Install Dependencies
      run: npm ci
      shell: bash
    - name: Run ESLint
      run: npm run lint
      shell: bash

name: Upgrade Storybook
inputs:
  token:
    required: true
runs:
  using: 'composite'
  steps:
    - name: Create Branch Name Variable
      id: branch
      run: echo "name=storybook/auto-upgrade" >> $GITHUB_OUTPUT
      shell: bash
    - name: Check If Upgrade PR Exists
      id: pr
      run: echo "state=$(gh pr list --head ${{ steps.branch.outputs.name }} --json state -q '.[0].state' 2>/dev/null || echo NONE)" >> $GITHUB_OUTPUT
      shell: bash
    - name: Determine If Upgrade Should Run
      id: upgrade
      run: echo "run=${{ github.event_name != 'push' || steps.pr.outputs.state == 'OPEN' }}" >> $GITHUB_OUTPUT
      shell: bash
    - name: Install Dependencies
      if: steps.upgrade.outputs.run == 'true'
      run: npm ci
      shell: bash
    - name: Read Old Version
      if: steps.upgrade.outputs.run == 'true'
      id: old
      uses: ./.github/actions/read-storybook-version
    - name: Upgrade Storybook
      if: steps.upgrade.outputs.run == 'true'
      run: npx storybook@latest upgrade
      shell: bash
    - name: Read New Version
      if: steps.upgrade.outputs.run == 'true'
      id: new
      uses: ./.github/actions/read-storybook-version
    - name: Create PR
      if: steps.upgrade.outputs.run == 'true' && steps.old.outputs.version != steps.new.outputs.version
      uses: peter-evans/create-pull-request@v8
      with:
        token: ${{ inputs.token }}
        branch: ${{ steps.branch.outputs.name }}
        base: master
        delete-branch: true
        commit-message: 'Bump storybook from ${{ steps.old.outputs.version }} to ${{ steps.new.outputs.version }}'
        title: 'Bump storybook from ${{ steps.old.outputs.version }} to ${{ steps.new.outputs.version }}'
    - name: Close Existing PR
      if: github.event_name == 'push' && steps.pr.outputs.state == 'OPEN' && steps.old.outputs.version == steps.new.outputs.version
      run: gh pr close ${{ steps.branch.outputs.name }} --delete-branch
      env:
        GH_TOKEN: ${{ inputs.token }}
      shell: bash

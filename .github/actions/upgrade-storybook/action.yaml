name: Upgrade Storybook
runs:
  using: 'composite'
  steps:
    - name: Install Dependencies
      run: npm ci
      shell: bash
    - name: Get Old Version
      run: |
        VERSION=$(node -p "require('./package.json').devDependencies.storybook.replace(/[^0-9.]/g, '')")
        echo "OLD_VERSION=${VERSION}" >> $GITHUB_ENV
    - name: Upgrade Storybook
      run: npx storybook@latest upgrade
      shell: bash
    - name: Get New Version
      run: |
        VERSION=$(node -p "require('./package.json').devDependencies.storybook.replace(/[^0-9.]/g, '')")
        echo "NEW_VERSION=${VERSION}" >> $GITHUB_ENV
    - name: Check For Changes
      run: git diff --quiet || echo "UPGRADE_STORYBOOK=true" >> $GITHUB_ENV
    - name: Create PR
      if: env.UPGRADE_STORYBOOK == 'true'
      uses: peter-evans/create-pull-request@v6
      with:
        branch: storybook/auto-upgrade
        delete-branch: false
        commit-message: 'Bump storybook from ${{ env.OLD_VERSION }} to ${{ env.NEW_VERSION }}'
        title: 'Bump storybook from ${{ env.OLD_VERSION }} to ${{ env.NEW_VERSION }}'

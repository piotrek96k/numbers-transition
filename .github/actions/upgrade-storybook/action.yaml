name: Upgrade Storybook
inputs:
  token:
    required: true
runs:
  using: 'composite'
  steps:
    - name: Check If Upgrade PR Branch Exists
      id: pr
      run: echo "exists=$(git ls-remote --heads origin storybook/auto-upgrade | grep -q storybook/auto-upgrade && echo true || echo false)" >> $GITHUB_OUTPUT
      shell: bash
    - name: Determine If Upgrade Should Run
      id: upgrade
      run: echo "run=${{ github.event_name != 'push' || steps.pr.outputs.exists == 'true' }}" >> $GITHUB_OUTPUT
      shell: bash
    - name: Install Dependencies
      if: steps.upgrade.outputs.run == 'true'
      run: npm ci
      shell: bash
    - name: Read Old Version
      if: steps.upgrade.outputs.run == 'true'
      id: old
      uses: ./.github/actions/read-storybook-version
    - name: Upgrade Storybook
      if: steps.upgrade.outputs.run == 'true'
      run: npx storybook@latest upgrade
      shell: bash
    - name: Read New Version
      if: steps.upgrade.outputs.run == 'true'
      id: new
      uses: ./.github/actions/read-storybook-version
    - name: Create PR
      if: steps.upgrade.outputs.run == 'true' && steps.old.outputs.version != steps.new.outputs.version
      uses: peter-evans/create-pull-request@v6
      with:
        token: ${{ inputs.token }}
        branch: storybook/auto-upgrade
        base: master
        delete-branch: true
        commit-message: 'Bump storybook from ${{ steps.old.outputs.version }} to ${{ steps.new.outputs.version }}'
        title: 'Bump storybook from ${{ steps.old.outputs.version }} to ${{ steps.new.outputs.version }}'
    - name: Close Existing PR
      if: github.event_name == 'push' && steps.pr.outputs.exists == 'true' && steps.old.outputs.version == steps.new.outputs.version
      run: gh pr close storybook/auto-upgrade --delete-branch
      env:
        GH_TOKEN: ${{ inputs.token }}
      shell: bash

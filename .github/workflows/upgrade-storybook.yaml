name: Upgrade Storybook
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
jobs:
  upgrade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Upgrade Storybook
        uses: ./.github/actions/upgrade-storybook
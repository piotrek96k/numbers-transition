name: Upgrade Storybook
on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches:
      - master
  workflow_dispatch:
permissions:
  contents: write
  pull-requests: write
jobs:
  upgrade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Check Upgrade Storybook PR Exists
        id: pr
        uses: ./.github/actions/check-upgrade-storybook-pr-exists
      - name: Upgrade Storybook
        if: github.event_name != 'push' || steps.pr.outputs.exists == 'true'
        uses: ./.github/actions/upgrade-storybook
        with:
          token: ${{ secrets.PAT_TOKEN }}
